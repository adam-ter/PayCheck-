<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayCheck</title>
    
    <!-- הגדרות אייקון ואפליקציה -->
    <link rel="icon" href="PayCheck.png">
    <link rel="apple-touch-icon" href="PayCheck.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PayCheck">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <!-- דף 1: רשימת עבודות -->
    <div id="pageHome" class="page active p-4 max-w-md mx-auto pb-10">
        <header class="mb-6 mt-4 text-center">
            <h1 class="text-3xl font-extrabold text-slate-800">העבודות שלי</h1>
        </header>

        <div id="jobsList" class="space-y-4 mb-8"></div>
        
        <div class="bg-white rounded-2xl p-6 shadow-lg border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">פרופיל עבודה חדש</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 mr-1">שם המעסיק / חברה</label>
                    <input type="text" id="newJobName" placeholder="לדוגמה: מלצרות" class="w-full p-3 bg-slate-50 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 mr-1">שכר שעתי (₪)</label>
                        <input type="number" id="newJobRate" placeholder="₪" class="w-full p-3 bg-slate-50 rounded-xl border">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 mr-1">נסיעות ליום</label>
                        <input type="number" id="newJobTravel" value="22.60" class="w-full p-3 bg-slate-50 rounded-xl border">
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl space-y-3 border border-slate-200">
                    <p class="text-xs font-bold text-slate-500 uppercase">נתוני זיכוי מס</p>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1 mr-1">מין</label>
                            <select id="newJobGender" onchange="updateLivePoints()" class="w-full p-2 border rounded-lg text-sm font-bold bg-white">
                                <option value="male">זכר</option>
                                <option value="female">נקבה</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1 mr-1">מספר ילדים</label>
                            <input type="number" id="newJobChildren" placeholder="0" oninput="updateLivePoints()" class="w-full p-2 border rounded-lg text-sm font-bold bg-white">
                        </div>
                    </div>
                    <div class="space-y-2 text-sm">
                        <label class="flex items-center gap-2"><input type="checkbox" id="newJobSoldier" onchange="updateLivePoints()"> חייל משוחרר</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="newJobDegree" onchange="updateLivePoints()"> בוגר תואר אקדמי</label>
                    </div>
                    <div class="text-center pt-2 border-t flex justify-between items-center">
                        <span class="text-xs text-slate-400">נקודות זיכוי מחושבות:</span>
                        <span id="livePoints" class="text-sm font-extrabold text-blue-600 bg-blue-50 px-2 py-1 rounded">2.25</span>
                    </div>
                </div>

                <button onclick="createJob()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">שמור פרופיל עבודה 💾</button>
            </div>
        </div>
    </div>

    <!-- דף 2: מעקב משמרות -->
    <div id="pageTracker" class="page p-4 max-w-md mx-auto pb-20">
        <div class="flex justify-between items-center mb-4">
            <button onclick="navTo('pageHome')" class="text-blue-600 font-bold flex items-center gap-1"><span>←</span> חזרה</button>
            <button onclick="deleteCurrentJob()" class="text-red-500 text-xs font-bold bg-red-50 px-3 py-1 rounded-full">מחק פרופיל</button>
        </div>

        <div class="bg-white rounded-3xl p-6 shadow-xl text-center mb-6 border-b-8 border-blue-600 relative overflow-hidden">
            <h2 id="activeJobTitle" class="text-2xl font-bold text-slate-800"></h2>
            <div class="py-8 bg-slate-50 rounded-2xl my-4">
                <div id="timerDisplay" class="text-5xl font-mono font-bold text-slate-800" dir="ltr">00:00:00</div>
                <button onclick="showDetailedNet()" class="mt-4 bg-emerald-100 text-emerald-700 px-4 py-2 rounded-full text-[11px] font-bold">
                    נטו משוער נוכחי: <span id="netDisplay">₪ 0</span> (פירוט)
                </button>
            </div>
            <button id="mainBtn" class="w-full py-4 rounded-2xl text-white font-extrabold text-lg shadow-lg"></button>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-6">
            <div class="bg-white p-3 rounded-xl border text-center shadow-sm">
                <p class="text-[10px] text-slate-400 uppercase font-bold">ברוטו החודש</p>
                <p id="statGross" class="font-bold text-slate-700 text-lg">₪0</p>
            </div>
            <div class="bg-white p-3 rounded-xl border text-center shadow-sm">
                <p class="text-[10px] text-slate-400 uppercase font-bold">נטו משוער</p>
                <p id="statNet" class="font-bold text-emerald-600 text-lg">₪0</p>
            </div>
        </div>

        <div id="jobHistory" class="space-y-2"></div>
    </div>

    <!-- מודאל פירוט -->
    <div id="explanationModal" class="modal"><div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl"><h3 class="text-lg font-bold mb-4 border-b pb-2">פירוט ניכויים</h3><div id="explanationContent" class="space-y-2 text-sm"></div><button onclick="closeModal()" class="w-full mt-6 py-3 bg-slate-800 text-white rounded-xl font-bold">סגור</button></div></div>

    <script>
        let jobs = [];
        let history = [];
        let currentActiveJobId = null;
        let timerInterval;

        function initApp() {
            const savedJobs = localStorage.getItem('jobProfiles');
            const savedHistory = localStorage.getItem('shiftHistory');
            if (savedJobs) jobs = JSON.parse(savedJobs);
            if (savedHistory) history = JSON.parse(savedHistory);
            
            renderJobsList();
            updateLivePoints();
            
            const ongoing = localStorage.getItem('ongoingShift');
            if (ongoing) {
                const shiftData = JSON.parse(ongoing);
                currentActiveJobId = shiftData.jobId;
                const job = jobs.find(j => j.id === currentActiveJobId);
                if (job) {
                    document.getElementById('activeJobTitle').textContent = job.name;
                    navTo('pageTracker');
                    checkOngoing();
                    renderJobHistory(currentActiveJobId);
                }
            }
        }

        function updateLivePoints() {
            const gender = document.getElementById('newJobGender').value;
            const children = parseInt(document.getElementById('newJobChildren').value) || 0;
            const soldier = document.getElementById('newJobSoldier').checked;
            const degree = document.getElementById('newJobDegree').checked;
            let pts = (gender === 'female' ? 2.75 : 2.25) + children;
            if (soldier) pts += 2;
            if (degree) pts += 1;
            document.getElementById('livePoints').textContent = pts.toFixed(2);
        }

        function createJob() {
            const name = document.getElementById('newJobName').value;
            const rate = parseFloat(document.getElementById('newJobRate').value);
            if (!name || !rate) return alert("מלא שם עבודה ושכר");

            const job = {
                id: Date.now().toString(),
                name, rate,
                travel: parseFloat(document.getElementById('newJobTravel').value) || 0,
                pension: { active: true, emp: 0.06 },
                tax: {
                    gender: document.getElementById('newJobGender').value,
                    children: parseInt(document.getElementById('newJobChildren').value) || 0,
                    soldier: document.getElementById('newJobSoldier').checked,
                    degree: document.getElementById('newJobDegree').checked
                }
            };
            jobs.push(job);
            saveData();
            renderJobsList();
            document.getElementById('newJobName').value = '';
            document.getElementById('newJobRate').value = '';
        }

        function saveData() {
            localStorage.setItem('jobProfiles', JSON.stringify(jobs));
            localStorage.setItem('shiftHistory', JSON.stringify(history));
        }

        function renderJobsList() {
            const list = document.getElementById('jobsList');
            list.innerHTML = '';
            jobs.forEach(j => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-2xl shadow-sm border-r-4 border-blue-500 flex justify-between items-center cursor-pointer active:bg-slate-50";
                div.onclick = () => { 
                    currentActiveJobId = j.id; 
                    document.getElementById('activeJobTitle').textContent = j.name; 
                    navTo('pageTracker'); 
                    checkOngoing(); 
                    renderJobHistory(j.id); 
                };
                div.innerHTML = `<div><h3 class="font-bold text-slate-800">${j.name}</h3><p class="text-xs text-slate-400">₪${j.rate}/שעה</p></div><span class="text-blue-500">←</span>`;
                list.appendChild(div);
            });
        }

        function checkOngoing() {
            const ongoing = JSON.parse(localStorage.getItem('ongoingShift'));
            const btn = document.getElementById('mainBtn');
            clearInterval(timerInterval);
            
            if (ongoing && ongoing.jobId === currentActiveJobId) {
                btn.textContent = "סיים משמרת"; 
                btn.className = "w-full py-4 rounded-2xl text-white font-bold bg-red-500 shadow-red-200 shadow-lg";
                timerInterval = setInterval(() => {
                    const diff = (Date.now() - ongoing.start) / 1000;
                    document.getElementById('timerDisplay').textContent = new Date(diff * 1000).toISOString().substr(11, 8);
                    const job = jobs.find(j => j.id === currentActiveJobId);
                    const res = calculateFullDetailed(diff/3600, job.rate, false, job);
                    document.getElementById('netDisplay').textContent = `₪ ${res.net.toFixed(1)}`;
                }, 1000);
            } else {
                btn.textContent = "התחל משמרת"; 
                btn.className = "w-full py-4 rounded-2xl text-white font-bold bg-blue-600 shadow-blue-200 shadow-lg";
                document.getElementById('timerDisplay').textContent = "00:00:00";
                document.getElementById('netDisplay').textContent = "₪ 0";
            }
        }

        document.getElementById('mainBtn').onclick = function() {
            const ongoing = JSON.parse(localStorage.getItem('ongoingShift'));
            if (!ongoing) {
                localStorage.setItem('ongoingShift', JSON.stringify({ start: Date.now(), jobId: currentActiveJobId }));
            } else {
                const start = ongoing.start;
                const end = Date.now();
                history.push({ 
                    id: Date.now().toString(), 
                    jobId: currentActiveJobId, 
                    start, end, 
                    hours: (end - start) / 3600000, 
                    isWeekend: [5,6].includes(new Date().getDay()) 
                });
                saveData();
                localStorage.removeItem('ongoingShift');
            }
            checkOngoing(); 
            renderJobHistory(currentActiveJobId);
        };

        function calculateFullDetailed(hours, rate, isWeekend, job) {
            let gross = hours * (isWeekend ? rate * 1.5 : rate);
            const pen = job.pension.active ? gross * 0.06 : 0;
            let pts = (job.tax.gender === 'female' ? 2.75 : 2.25) + job.tax.children;
            if (job.tax.soldier) pts += 2;
            if (job.tax.degree) pts += 1;
            const ptVal = (pts * 242) / 22; 
            let incomeTax = Math.max(0, (gross * 0.1) - ptVal);
            const bLeumi = gross * 0.04;
            return { gross, pen, incomeTax, bLeumi, net: gross - pen - incomeTax - bLeumi, pts };
        }

        function renderJobHistory(jobId) {
            const container = document.getElementById('jobHistory');
            const job = jobs.find(j => j.id === jobId);
            container.innerHTML = '<p class="text-[11px] font-bold text-slate-400 uppercase mb-2">היסטוריית משמרות</p>';
            
            const shifts = history.filter(h => h.jobId === jobId).slice().reverse();
            let totalG = 0, totalN = 0;

            history.filter(h => h.jobId === jobId).forEach(s => {
                const res = calculateFullDetailed(s.hours, job.rate, s.isWeekend, job);
                totalG += res.gross; totalN += (res.net + job.travel);
            });

            shifts.forEach(s => {
                const res = calculateFullDetailed(s.hours, job.rate, s.isWeekend, job);
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center";
                div.innerHTML = `<div><p class="text-xs font-bold text-slate-700">${new Date(s.start).toLocaleDateString('he-IL')}</p><p class="text-[10px] text-slate-400">${s.hours.toFixed(1)} שעות</p></div><div class="text-emerald-600 font-bold">₪${(res.net + job.travel).toFixed(0)}</div>`;
                container.appendChild(div);
            });
            
            document.getElementById('statGross').textContent = `₪${totalG.toFixed(0)}`;
            document.getElementById('statNet').textContent = `₪${totalN.toFixed(0)}`;
        }

        function navTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function deleteCurrentJob() {
            if(confirm("למחוק את הפרופיל וההיסטוריה?")) {
                jobs = jobs.filter(j => j.id !== currentActiveJobId);
                history = history.filter(h => h.jobId !== currentActiveJobId);
                saveData();
                navTo('pageHome');
                renderJobsList();
            }
        }

        function closeModal() { document.getElementById('explanationModal').classList.remove('active'); }
        window.onload = initApp;
    </script>
</body>
</html>
