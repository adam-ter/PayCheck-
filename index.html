<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayCheck</title>
    
    <link rel="icon" href="PayCheck.png">
    <link rel="apple-touch-icon" href="PayCheck.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PayCheck">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-dark: #064e4b;
            --brand-main: #0d9488;
            --brand-light: #2dd4bf;
            --brand-grad: linear-gradient(135deg, #064e4b 0%, #0d9488 50%, #2dd4bf 100%);
        }

        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: #f1f5f9; 
            -webkit-tap-highlight-color: transparent; 
            color: #1e293b;
            user-select: none;
        }

        .brand-gradient-bg { background: var(--brand-grad); }
        .brand-text { color: var(--brand-dark); }
        
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: white; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.7); }
        .btn-primary { 
            background: var(--brand-grad); 
            color: white; 
            border-radius: 18px; 
            font-weight: 800; 
            box-shadow: 0 10px 20px -5px rgba(13, 148, 136, 0.4);
            transition: all 0.2s;
        }
        .btn-primary:active { transform: scale(0.96); opacity: 0.9; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; padding: 1.5rem; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <div id="pageHome" class="page active p-5 max-w-md mx-auto pb-10">
        <header class="mb-8 mt-6 text-center">
            <img src="PayCheck.png" class="w-16 h-16 mx-auto mb-3 rounded-2xl shadow-sm" alt="PayCheck Logo">
            <h1 class="text-4xl font-extrabold brand-text tracking-tight">PayCheck</h1>
            <p class="text-slate-400 font-semibold text-sm">העבודות שלי</p>
        </header>

        <div id="jobsList" class="space-y-4 mb-10"></div>
        
        <div class="card p-6">
            <h2 class="text-lg font-bold brand-text mb-4 border-b border-slate-100 pb-2">הוספת מקום עבודה</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1 mr-1 uppercase">שם העסק</label>
                    <input type="text" id="newJobName" placeholder="לדוגמה: מלצרות" class="w-full p-3.5 bg-slate-50 rounded-xl border-0 focus:ring-2 focus:ring-teal-500 outline-none font-semibold">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1 mr-1 uppercase">שכר שעתי</label>
                        <input type="number" id="newJobRate" placeholder="₪" class="w-full p-3.5 bg-slate-50 rounded-xl border-0 font-bold">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1 mr-1 uppercase">נסיעות (יומי)</label>
                        <input type="number" id="newJobTravel" value="22.60" class="w-full p-3.5 bg-slate-50 rounded-xl border-0 font-bold text-slate-600">
                    </div>
                </div>

                <div class="bg-teal-50/50 p-4 rounded-2xl space-y-3 border border-teal-100">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-teal-600/70 mb-1 uppercase">מין</label>
                            <select id="newJobGender" onchange="updateLivePoints()" class="w-full p-2.5 border-0 rounded-lg text-sm font-bold bg-white text-teal-900 shadow-sm outline-none">
                                <option value="male">זכר</option>
                                <option value="female">נקבה</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-teal-600/70 mb-1 uppercase">ילדים</label>
                            <input type="number" id="newJobChildren" placeholder="0" oninput="updateLivePoints()" class="w-full p-2.5 border-0 rounded-lg text-sm font-bold bg-white shadow-sm outline-none">
                        </div>
                    </div>
                    <div class="space-y-2 text-sm font-semibold text-teal-800">
                        <label class="flex items-center gap-2"><input type="checkbox" id="newJobSoldier" onchange="updateLivePoints()" class="w-4 h-4 accent-teal-600"> חייל משוחרר</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="newJobDegree" onchange="updateLivePoints()" class="w-4 h-4 accent-teal-600"> בוגר תואר אקדמי</label>
                    </div>
                    <div class="text-center pt-2 border-t border-teal-100 flex justify-between items-center">
                        <span class="text-[10px] font-bold text-teal-600 uppercase">נקודות זיכוי</span>
                        <span id="livePoints" class="text-sm font-extrabold text-white bg-teal-600 px-3 py-1 rounded-full shadow-sm">2.25</span>
                    </div>
                </div>

                <button onclick="createJob()" class="w-full py-4 btn-primary text-lg">שמור פרופיל עבודה 💾</button>
            </div>
        </div>
    </div>

    <div id="pageTracker" class="page p-5 max-w-md mx-auto pb-20">
        <div class="flex justify-between items-center mb-6">
            <button onclick="navTo('pageHome')" class="text-teal-600 font-extrabold flex items-center gap-1 bg-white px-4 py-2 rounded-full shadow-sm active:scale-95 transition-all"><span>←</span> חזרה</button>
            <button onclick="deleteCurrentJob()" class="text-red-500 text-[10px] font-bold uppercase tracking-wider bg-red-50 px-3 py-1.5 rounded-full">מחק פרופיל</button>
        </div>

        <div class="card p-8 text-center mb-6 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 brand-gradient-bg"></div>
            <h2 id="activeJobTitle" class="text-2xl font-extrabold brand-text mb-1"></h2>
            
            <div class="py-10 my-4 bg-slate-50 rounded-3xl border border-slate-100">
                <div id="timerDisplay" class="text-6xl font-mono font-black text-slate-800 tracking-tighter" dir="ltr">00:00:00</div>
                <button onclick="showDetailedNet()" class="mt-5 bg-teal-50 text-teal-700 px-5 py-2.5 rounded-full text-[12px] font-bold border border-teal-100 active:scale-95 transition-all">
                    נטו משוער כרגע: <span id="netDisplay" class="font-black">₪ 0.00</span> (פירוט)
                </button>
            </div>
            
            <button id="mainBtn" class="w-full py-5 rounded-2xl text-white font-black text-xl shadow-xl transition-all"></button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="card p-4 text-center">
                <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">ברוטו החודש</p>
                <p id="statGross" class="font-black text-slate-700 text-xl">₪0.00</p>
            </div>
            <div class="card p-4 text-center border-teal-100 bg-teal-50/20">
                <p class="text-[10px] text-teal-500 uppercase font-bold mb-1">נטו משוער</p>
                <p id="statNet" class="font-black text-teal-600 text-xl">₪0.00</p>
            </div>
        </div>

        <div id="jobHistory" class="space-y-3"></div>
    </div>

    <div id="explanationModal" class="modal">
        <div class="card p-7 max-w-sm w-full animate-fadeIn">
            <h3 class="text-xl font-black brand-text mb-4 border-b pb-2">פירוט ניכויים משוער</h3>
            <div id="explanationContent" class="space-y-4 text-sm font-semibold text-slate-600">
                </div>
            <button onclick="closeModal()" class="w-full mt-8 py-4 btn-primary">סגור פירוט</button>
        </div>
    </div>

    <script>
        let jobs = [];
        let history = [];
        let currentActiveJobId = null;
        let timerInterval;

        function initApp() {
            const savedJobs = localStorage.getItem('jobProfiles');
            const savedHistory = localStorage.getItem('shiftHistory');
            if (savedJobs) jobs = JSON.parse(savedJobs);
            if (savedHistory) history = JSON.parse(savedHistory);
            
            renderJobsList();
            updateLivePoints();
            
            const ongoing = localStorage.getItem('ongoingShift');
            if (ongoing) {
                const shiftData = JSON.parse(ongoing);
                currentActiveJobId = shiftData.jobId;
                const job = jobs.find(j => j.id === currentActiveJobId);
                if (job) {
                    document.getElementById('activeJobTitle').textContent = job.name;
                    navTo('pageTracker');
                    checkOngoing();
                    renderJobHistory(currentActiveJobId);
                }
            }
        }

        function updateLivePoints() {
            const gender = document.getElementById('newJobGender').value;
            const children = parseInt(document.getElementById('newJobChildren').value) || 0;
            const soldier = document.getElementById('newJobSoldier').checked;
            const degree = document.getElementById('newJobDegree').checked;
            
            let pts = (gender === 'female' ? 2.75 : 2.25) + children;
            if (soldier) pts += 2;
            if (degree) pts += 1;
            
            document.getElementById('livePoints').textContent = pts.toFixed(2);
        }

        function createJob() {
            const name = document.getElementById('newJobName').value;
            const rate = parseFloat(document.getElementById('newJobRate').value);
            if (!name || !rate) return alert("אנא מלא שם עסק ושכר שעתי");

            const job = {
                id: Date.now().toString(),
                name, rate,
                travel: parseFloat(document.getElementById('newJobTravel').value) || 0,
                pension: { active: true, emp: 0.06 },
                tax: {
                    gender: document.getElementById('newJobGender').value,
                    children: parseInt(document.getElementById('newJobChildren').value) || 0,
                    soldier: document.getElementById('newJobSoldier').checked,
                    degree: document.getElementById('newJobDegree').checked
                }
            };
            jobs.push(job);
            saveData();
            renderJobsList();
            document.getElementById('newJobName').value = '';
            document.getElementById('newJobRate').value = '';
        }

        function saveData() {
            localStorage.setItem('jobProfiles', JSON.stringify(jobs));
            localStorage.setItem('shiftHistory', JSON.stringify(history));
        }

        function renderJobsList() {
            const list = document.getElementById('jobsList');
            list.innerHTML = '';
            jobs.forEach(j => {
                const div = document.createElement('div');
                div.className = "card p-5 flex justify-between items-center cursor-pointer active:scale-95 transition-all border-r-8 border-r-teal-500";
                div.onclick = () => { 
                    currentActiveJobId = j.id; 
                    document.getElementById('activeJobTitle').textContent = j.name; 
                    navTo('pageTracker'); 
                    checkOngoing(); 
                    renderJobHistory(j.id); 
                };
                div.innerHTML = `<div><h3 class="font-bold text-slate-800 text-lg">${j.name}</h3><p class="text-xs font-bold text-teal-600">₪${j.rate.toFixed(2)}/שעה</p></div><span class="text-teal-400 font-black">←</span>`;
                list.appendChild(div);
            });
        }

        function checkOngoing() {
            const ongoing = JSON.parse(localStorage.getItem('ongoingShift'));
            const btn = document.getElementById('mainBtn');
            clearInterval(timerInterval);
            
            if (ongoing && ongoing.jobId === currentActiveJobId) {
                btn.textContent = "סיים משמרת"; 
                btn.className = "w-full py-5 rounded-2xl text-white font-black text-xl bg-red-500 shadow-lg shadow-red-200 active:scale-95 transition-all";
                
                timerInterval = setInterval(() => {
                    const diffSeconds = (Date.now() - ongoing.start) / 1000;
                    document.getElementById('timerDisplay').textContent = new Date(diffSeconds * 1000).toISOString().substr(11, 8);
                    
                    const job = jobs.find(j => j.id === currentActiveJobId);
                    const res = calculateFullDetailed(diffSeconds/3600, job.rate, false, job);
                    document.getElementById('netDisplay').textContent = `₪ ${res.net.toFixed(2)}`;
                }, 1000);
            } else {
                btn.textContent = "התחל משמרת"; 
                btn.className = "w-full py-5 rounded-2xl text-white font-black text-xl btn-primary active:scale-95 transition-all";
                document.getElementById('timerDisplay').textContent = "00:00:00";
                document.getElementById('netDisplay').textContent = "₪ 0.00";
            }
        }

        document.getElementById('mainBtn').onclick = function() {
            const ongoing = JSON.parse(localStorage.getItem('ongoingShift'));
            if (!ongoing) {
                localStorage.setItem('ongoingShift', JSON.stringify({ start: Date.now(), jobId: currentActiveJobId }));
            } else {
                const start = ongoing.start;
                const end = Date.now();
                const diffMs = end - start;

                // בדיקה אם עברה לפחות דקה (60,000 מילישניות)
                if (diffMs < 60000) {
                    alert("משמרת חייבת להימשך לפחות דקה אחת.");
                    return;
                }

                history.push({ 
                    id: Date.now().toString(), 
                    jobId: currentActiveJobId, 
                    start, end, 
                    hours: diffMs / 3600000, 
                    isWeekend: [5,6].includes(new Date().getDay()) 
                });
                saveData();
                localStorage.removeItem('ongoingShift');
            }
            checkOngoing(); 
            renderJobHistory(currentActiveJobId);
        };

        function calculateFullDetailed(hours, rate, isWeekend, job) {
            let gross = hours * (isWeekend ? rate * 1.5 : rate);
            const pen = job.pension.active ? gross * 0.06 : 0;
            
            let pts = (job.tax.gender === 'female' ? 2.75 : 2.25) + (job.tax.children || 0);
            if (job.tax.soldier) pts += 2;
            if (job.tax.degree) pts += 1;
            
            const ptValuePerHour = (pts * 242) / 182; 
            let incomeTaxRaw = (gross * 0.10); 
            let incomeTax = Math.max(0, incomeTaxRaw - (ptValuePerHour * hours));
            const bLeumi = gross * 0.04;
            const net = gross - pen - incomeTax - bLeumi;
            
            return { gross, pen, incomeTax, bLeumi, net, pts };
        }

        function renderJobHistory(jobId) {
            const container = document.getElementById('jobHistory');
            const job = jobs.find(j => j.id === jobId);
            container.innerHTML = '<p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mr-2 mb-2">משמרות אחרונות</p>';
            
            const shifts = history.filter(h => h.jobId === jobId).slice().reverse();
            let totalG = 0, totalN = 0;

            history.filter(h => h.jobId === jobId).forEach(s => {
                const res = calculateFullDetailed(s.hours, job.rate, s.isWeekend, job);
                totalG += res.gross; 
                totalN += (res.net + job.travel);
            });

            shifts.forEach(s => {
                const res = calculateFullDetailed(s.hours, job.rate, s.isWeekend, job);
                const div = document.createElement('div');
                div.className = "card p-4 flex justify-between items-center";
                div.innerHTML = `
                    <div>
                        <p class="text-sm font-bold text-slate-800">${new Date(s.start).toLocaleDateString('he-IL')}</p>
                        <p class="text-[11px] font-bold text-slate-400">${s.hours.toFixed(2)} שעות</p>
                    </div>
                    <div class="text-teal-600 font-black text-lg">₪${(res.net + job.travel).toFixed(2)}</div>
                `;
                container.appendChild(div);
            });
            
            document.getElementById('statGross').textContent = `₪${totalG.toFixed(2)}`;
            document.getElementById('statNet').textContent = `₪${totalN.toFixed(2)}`;
        }

        function showDetailedNet() {
            const ongoing = JSON.parse(localStorage.getItem('ongoingShift'));
            if (!ongoing) return;
            
            const diffHours = (Date.now() - ongoing.start) / 3600000;
            const job = jobs.find(j => j.id === currentActiveJobId);
            const res = calculateFullDetailed(diffHours, job.rate, false, job);
            
            const content = document.getElementById('explanationContent');
            content.innerHTML = `
                <div class="flex justify-between"><span>ברוטו:</span><span class="text-slate-800 font-bold">₪${res.gross.toFixed(2)}</span></div>
                <div class="flex justify-between text-red-500"><span>פנסיה (6%):</span><span>-₪${res.pen.toFixed(2)}</span></div>
                <div class="flex justify-between text-red-500"><span>מס הכנסה:</span><span>-₪${res.incomeTax.toFixed(2)}</span></div>
                <div class="flex justify-between text-red-500"><span>ב. לאומי ומס בריאות:</span><span>-₪${res.bLeumi.toFixed(2)}</span></div>
                <div class="flex justify-between border-t pt-2 brand-text font-black text-lg"><span>נטו משוער:</span><span>₪${res.net.toFixed(2)}</span></div>
            `;
            document.getElementById('explanationModal').classList.add('active');
        }

        function closeModal() { document.getElementById('explanationModal').classList.remove('active'); }
        function navTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function deleteCurrentJob() {
            if(confirm("למחוק פרופיל זה?")) {
                jobs = jobs.filter(j => j.id !== currentActiveJobId);
                history = history.filter(h => h.jobId !== currentActiveJobId);
                saveData();
                navTo('pageHome');
                renderJobsList();
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
